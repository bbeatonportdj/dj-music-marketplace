    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff3b30" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://www.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googleapis.com" />

    <!-- SEO Meta Tags -->
    <title>DJ Music Marketplace - Premium DJ Edit Packs & Music</title>

    <meta name="author" content="DJ Music Marketplace" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://djmusicmarketplace.fun/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="DJ Music Marketplace - Premium DJ Edit Packs & Music" />
    <meta property="og:description" content="Download premium DJ edits, remixes, and original productions. 2000+ tracks across House, Techno, Trance, Hip-Hop, and more." />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DJ Music Marketplace" />

    <meta name="twitter:description" content="Download premium DJ edits, remixes, and original productions. 2000+ tracks." />
    <meta name="twitter:image" content="https://djmusicmarketplace.fun/og-image.jpg" />
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'GA_MEASUREMENT_ID'); // ใส่ GA4 Measurement ID ของคุณ
    </script>
    
    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="YOUR_GSC_VERIFICATION_CODE" />
