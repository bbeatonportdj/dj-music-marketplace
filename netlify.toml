[build]
  command = "node -e \"const fs = require('fs'); let r = fs.readFileSync('public/_redirects', 'utf8'); r = r.replace(/https:\\/\\/BACKEND_API_URL_PLACEHOLDER/g, process.env.BACKEND_API_URL || 'http://localhost:5001'); fs.writeFileSync('public/_redirects', r);\" && npm run build"
  publish = "dist"